# ============================================================
# Phase 2 — Topic Filter (Namespace Isolation)
#
# What this adds (on top of phase-1):
#   - Two virtual clusters with namespace prefix isolation
#   - retail-banking-ny: prefix "RETAIL_NY.", accessible on ports 19192-19290
#   - wealth-management-la: prefix "WEALTH_LA.", accessible on ports 19292-19390
#   - Shared topics injected into both views
#   - Auth still anonymous; ACLs still passthrough
#
# Based on: examples/03-topic-filter
#
# Apply:
#   kongctl apply -f kongctl/phase-2-topic-filter.yaml
# ============================================================

_defaults:
  kongctl:
    namespace: keg-examples

event_gateways:
  - ref: keg-examples-gateway
    name: keg-examples-gateway
    description: Kong Event Gateway Examples — local Kafka cluster
    labels:
      env: example
      project: keg-examples

    backend_clusters:
      - ref: local-kafka
        name: local-kafka
        labels:
          env: example
          role: message-broker
          tier: backend
        authentication:
          type: anonymous
        bootstrap_servers:
          - kafka1:9092
          - kafka2:9092
          - kafka3:9092
        tls:
          enabled: false
        insecure_allow_anonymous_virtual_cluster_auth: true

    listeners:
      - ref: core-listener
        name: core-listener
        labels:
          env: example
          role: ingress
        addresses: ["0.0.0.0"]
        ports: ["19092-19190"]
        policies:
          - ref: forward-to-core-proxy
            type: forward_to_virtual_cluster
            name: forward-to-core-proxy
            labels:
              env: example
              role: routing
            config:
              type: port_mapping
              destination:
                id: !ref core-proxy
              advertised_host: localhost
              bootstrap_port: none
              min_broker_id: 0

      - ref: retail-banking-ny-listener
        name: retail-banking-ny-listener
        labels:
          env: example
          role: ingress
          business-unit: retail-banking-ny
        addresses: ["0.0.0.0"]
        ports: ["19192-19290"]
        policies:
          - ref: forward-to-retail-banking-ny
            type: forward_to_virtual_cluster
            name: forward-to-retail-banking-ny
            labels:
              env: example
              role: routing
              business-unit: retail-banking-ny
            config:
              type: port_mapping
              destination:
                id: !ref retail-banking-ny
              advertised_host: localhost
              bootstrap_port: none
              min_broker_id: 0

      - ref: wealth-management-la-listener
        name: wealth-management-la-listener
        labels:
          env: example
          role: ingress
          business-unit: wealth-management-la
        addresses: ["0.0.0.0"]
        ports: ["19292-19390"]
        policies:
          - ref: forward-to-wealth-management-la
            type: forward_to_virtual_cluster
            name: forward-to-wealth-management-la
            labels:
              env: example
              role: routing
              business-unit: wealth-management-la
            config:
              type: port_mapping
              destination:
                id: !ref wealth-management-la
              advertised_host: localhost
              bootstrap_port: none
              min_broker_id: 0

    virtual_clusters:
      - ref: retail-banking-ny
        name: retail-banking-ny
        description: Retail Banking NY — namespace isolated with prefix "RETAIL_NY."
        labels:
          env: example
          role: virtual-cluster
          business-unit: retail-banking-ny
        destination:
          id: !ref local-kafka
        acl_mode: passthrough
        dns_label: retail-banking-ny
        namespace:
          mode: hide_prefix
          prefix: "RETAIL_NY."
          additional:
            topics:
              - type: glob
                glob: "nw.*"
        authentication:
          - type: anonymous

      - ref: wealth-management-la
        name: wealth-management-la
        description: Wealth Management LA — namespace isolated with prefix "WEALTH_LA."
        labels:
          env: example
          role: virtual-cluster
          business-unit: wealth-management-la
        destination:
          id: !ref local-kafka
        acl_mode: passthrough
        dns_label: wealth-management-la
        namespace:
          mode: hide_prefix
          prefix: "WEALTH_LA."
          additional:
            topics:
              - type: glob
                glob: "nw.*"
        authentication:
          - type: anonymous

      - ref: core-proxy
        name: core-proxy
        description: Flat passthrough virtual cluster — all topics visible.
        labels:
          env: example
          role: virtual-cluster
          tier: core
        destination:
          id: !ref local-kafka
        acl_mode: passthrough
        dns_label: core-proxy
        authentication:
          - type: anonymous
