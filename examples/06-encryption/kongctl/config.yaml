# ============================================================
# Phase 6 — Message Encryption
#
# What this adds (on top of phase-3):
#   - Static encryption key (loaded from environment)
#   - Produce policy: encrypt high-value wire transfer values
#   - Consume policy: decrypt high-value wire transfer values
#
# Required env vars:
#   TRANSACTION_ENCRYPTION_KEY — base64-encoded 32-byte key
#   export TRANSACTION_ENCRYPTION_KEY=$(openssl rand -base64 32)
#
# Based on: examples/06-encryption
#
# Apply:
#   kongctl apply -f kongctl/phase-6-encryption.yaml
# ============================================================

_defaults:
  kongctl:
    namespace: keg-examples

event_gateways:
  - ref: keg-examples-gateway
    name: keg-examples-gateway
    description: Kong Event Gateway Examples — local Kafka cluster
    labels:
      env: example
      project: keg-examples

    backend_clusters:
      - ref: local-kafka
        name: local-kafka
        labels:
          env: example
          role: message-broker
          tier: backend
        authentication:
          type: anonymous
        bootstrap_servers:
          - kafka1:9092
          - kafka2:9092
          - kafka3:9092
        tls:
          enabled: false
        insecure_allow_anonymous_virtual_cluster_auth: true

    static_keys:
      - ref: transaction-encryption-key
        name: transaction-encryption-key
        description: Encryption key for high-value wire transfer events
        labels:
          env: example
          role: encryption-key
        value: !env TRANSACTION_ENCRYPTION_KEY

    listeners:
      - ref: core-listener
        name: core-listener
        labels:
          env: example
          role: ingress
        addresses: ["0.0.0.0"]
        ports: ["19092-19190"]
        policies:
          - ref: forward-to-core-proxy
            type: forward_to_virtual_cluster
            name: forward-to-core-proxy
            labels:
              env: example
              role: routing
            config:
              type: port_mapping
              destination:
                id: !ref core-proxy
              advertised_host: localhost
              bootstrap_port: none
              min_broker_id: 0

      - ref: retail-banking-ny-listener
        name: retail-banking-ny-listener
        labels:
          env: example
          role: ingress
          business-unit: retail-banking-ny
        addresses: ["0.0.0.0"]
        ports: ["19192-19290"]
        policies:
          - ref: forward-to-retail-banking-ny
            type: forward_to_virtual_cluster
            name: forward-to-retail-banking-ny
            labels:
              env: example
              role: routing
              business-unit: retail-banking-ny
            config:
              type: port_mapping
              destination:
                id: !ref retail-banking-ny
              advertised_host: localhost
              bootstrap_port: none
              min_broker_id: 0

      - ref: wealth-management-la-listener
        name: wealth-management-la-listener
        labels:
          env: example
          role: ingress
          business-unit: wealth-management-la
        addresses: ["0.0.0.0"]
        ports: ["19292-19390"]
        policies:
          - ref: forward-to-wealth-management-la
            type: forward_to_virtual_cluster
            name: forward-to-wealth-management-la
            labels:
              env: example
              role: routing
              business-unit: wealth-management-la
            config:
              type: port_mapping
              destination:
                id: !ref wealth-management-la
              advertised_host: localhost
              bootstrap_port: none
              min_broker_id: 0

    virtual_clusters:
      - ref: retail-banking-ny
        name: retail-banking-ny
        description: Retail Banking NY — anonymous access
        labels:
          env: example
          role: virtual-cluster
          business-unit: retail-banking-ny
        destination:
          id: !ref local-kafka
        acl_mode: passthrough
        dns_label: retail-banking-ny
        namespace:
          mode: hide_prefix
          prefix: "RETAIL_NY."
          additional:
            topics:
              - type: glob
                glob: "nw.*"
        authentication:
          - type: anonymous

      - ref: wealth-management-la
        name: wealth-management-la
        description: Wealth Management LA — ACL enforcement at the gateway
        labels:
          env: example
          role: virtual-cluster
          business-unit: wealth-management-la
        destination:
          id: !ref local-kafka
        acl_mode: enforce_on_gateway
        dns_label: wealth-management-la
        namespace:
          mode: hide_prefix
          prefix: "WEALTH_LA."
          additional:
            topics:
              - type: glob
                glob: "nw.*"
        authentication:
          - type: anonymous
          - type: sasl_plain
            mediation: terminate
            principals:
              - username: wealth-advisors
                password: secret

        cluster_policies:
          - ref: acl-wealth-management-la
            type: acls
            name: acl-wealth-management-la
            labels:
              env: example
              role: access-control
              business-unit: wealth-management-la
            condition: "context.auth.principal.name != 'wealth-advisors'"
            config:
              rules:
                - action: allow
                  resource_type: topic
                  operations:
                    - name: describe
                    - name: read
                  resource_names:
                    - match: "*"
                - action: allow
                  resource_type: group
                  operations:
                    - name: read
                  resource_names:
                    - match: "*"

          - ref: acl-wealth-management-la-advisors
            type: acls
            name: acl-wealth-management-la-advisors
            labels:
              env: example
              role: access-control
              business-unit: wealth-management-la
            condition: "context.auth.principal.name == 'wealth-advisors'"
            config:
              rules:
                - action: allow
                  resource_type: topic
                  operations:
                    - name: describe
                    - name: read
                    - name: write
                  resource_names:
                    - match: "*"
                - action: allow
                  resource_type: group
                  operations:
                    - name: describe
                    - name: read
                    - name: write
                    - name: create
                  resource_names:
                    - match: "*"

      - ref: core-proxy
        name: core-proxy
        description: >-
          Flat passthrough virtual cluster. Phase 6 adds produce/consume
          policies for wire transfer encryption.
        labels:
          env: example
          role: virtual-cluster
          tier: core
        destination:
          id: !ref local-kafka
        acl_mode: passthrough
        dns_label: core-proxy
        authentication:
          - type: anonymous

        produce_policies:
          - ref: wire-transfer-encryption-policy
            type: encrypt
            name: wire-transfer-encryption-policy
            labels:
              env: example
              role: encryption
            description: Encrypts high-value wire transfer event values before they reach the broker
            condition: 'context.topic.name == "nw.ledger.transactions.high-value-wire-transfers.v1"'
            config:
              failure_mode: error
              part_of_record:
                - value
              encryption_key:
                type: static
                key:
                  id: !ref transaction-encryption-key

        consume_policies:
          - ref: wire-transfer-decryption-policy
            type: decrypt
            name: wire-transfer-decryption-policy
            labels:
              env: example
              role: encryption
            description: Decrypts high-value wire transfer events transparently for authorised consumers
            condition: 'context.topic.name == "nw.ledger.transactions.high-value-wire-transfers.v1"'
            config:
              failure_mode: error
              part_of_record:
                - value
              key_sources:
                - type: static
                  key:
                    id: !ref transaction-encryption-key
