# ============================================================
# Variant — Redpanda Backend
#
# This is an ALTERNATIVE configuration that replaces the
# local Kafka cluster with a Redpanda cluster.
# Apply this INSTEAD of the phase files to use Redpanda
# as the backend.
#
# Features:
#   - Anonymous authentication to Redpanda
#   - Port-based routing
#   - Flat passthrough virtual cluster
#
# Based on: examples/A2-redpanda
#
# Apply:
#   kongctl apply -f kongctl/variant-redpanda.yaml
# ============================================================

_defaults:
  kongctl:
    namespace: keg-examples

event_gateways:
  - ref: keg-examples-gateway
    name: keg-examples-gateway
    description: Redpanda backend
    labels:
      env: example
      project: keg-examples

    backend_clusters:
      - ref: redpanda-local
        name: redpanda-local
        labels:
          env: example
          role: message-broker
          tier: backend
          provider: redpanda
        authentication:
          algorithm: sha256
          type: sasl_scram
          password: ${env["KAFKA_PASSWORD"]}
          username: ${env["KAFKA_USERNAME"]}
        bootstrap_servers:
          - redpanda-0:9092
        tls:
          enabled: false
        insecure_allow_anonymous_virtual_cluster_auth: true

    listeners:
      - ref: redpanda-listener
        name: redpanda-listener
        labels:
          env: example
          role: ingress
        addresses:
          - "0.0.0.0"
        ports:
          - "9192-9290"
        policies:
          - ref: forward-to-redpanda-vc
            type: forward_to_virtual_cluster
            name: forward-to-redpanda-vc
            labels:
              env: example
              role: routing
            config:
              type: port_mapping
              destination:
                id: !ref redpanda-proxy
              advertised_host: localhost
              bootstrap_port: none
              min_broker_id: 0

    virtual_clusters:
      - ref: redpanda-proxy
        name: redpanda-proxy
        description: Flat passthrough virtual cluster for Redpanda
        labels:
          env: example
          role: virtual-cluster
          tier: core
          provider: redpanda
        destination:
          id: !ref redpanda-local
        acl_mode: passthrough
        dns_label: redpanda-proxy
        authentication:
          - type: anonymous
