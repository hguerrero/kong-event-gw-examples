# ============================================================================
# Data Plane Certificate
#
# NOTE: Generate the certificate before applying.
#
#   openssl req -new -x509 -nodes -newkey rsa:2048 \
#     -subj "/CN=event-gateway/C=US" \
#     -keyout kongctl/certs/key.crt \
#     -out    kongctl/certs/tls.crt
#
# The private key (key.crt) stays local — only tls.crt is uploaded to Konnect.
# ============================================================================

_defaults:
  kongctl:
    namespace: keg-examples

event_gateways:
  - ref: keg-examples-gateway
    name: keg-examples-gateway
    labels:
      env: example
      project: keg-examples
    data_plane_certificates:
      - ref: keg-data-plane-cert
        name: keg-data-plane-cert
        labels:
          env: example
          role: data-plane-cert
        certificate: !file ./certs/tls.crt
